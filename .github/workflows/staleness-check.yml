name: Check backup health

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Check last sync age
        run: |
          LAST_EPOCH=$(git for-each-ref refs/tags/last-sync --format='%(taggerdate:unix)')
          if [ -z "$LAST_EPOCH" ]; then
            echo "::error::No last-sync tag found — has sync ever run?"
            exit 1
          fi

          NOW=$(date +%s)
          AGE_HOURS=$(( (NOW - LAST_EPOCH) / 3600 ))
          echo "Last successful sync: $AGE_HOURS hours ago"

          if [ "$AGE_HOURS" -gt 48 ]; then
            echo "::error::Vault sync is stale ($AGE_HOURS hours since last successful sync)"
            exit 1
          fi

      - name: Check repo size
        run: |
          REPO_SIZE=$(gh api repos/${{ github.repository }} --jq '.size')
          REPO_MB=$(( REPO_SIZE / 1024 ))
          echo "Repo size: ${REPO_MB}MB (${REPO_SIZE}KB)"

          if [ "$REPO_SIZE" -gt 51200 ]; then
            echo "::error::Repo size is ${REPO_MB}MB — investigate large files"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
