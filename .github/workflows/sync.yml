name: Sync Obsidian Vault

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  SYNC_TIMEOUT: ${{ vars.SYNC_TIMEOUT || '15' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache obsidian-headless
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: obsidian-headless-${{ runner.os }}

      - name: Install tools
        run: |
          npm install -g obsidian-headless
          sudo apt-get update && sudo apt-get install -y git-crypt

      - name: Authenticate
        run: |
          if OBSIDIAN_AUTH_TOKEN="${{ secrets.OBSIDIAN_AUTH_TOKEN }}" \
             ob sync-list-remote > /dev/null 2>&1; then
            echo "Auth token valid"
            echo "OBSIDIAN_AUTH_TOKEN=${{ secrets.OBSIDIAN_AUTH_TOKEN }}" >> "$GITHUB_ENV"
          else
            echo "::warning::Auth token expired, falling back to password+TOTP"
            npm install otpauth
            MFA_CODE=$(node -e "
              const { TOTP, Secret } = require('otpauth');
              const totp = new TOTP({
                secret: Secret.fromBase32('${{ secrets.OBSIDIAN_TOTP_SECRET }}')
              });
              console.log(totp.generate());
            ")
            ob login \
              --email "${{ secrets.OBSIDIAN_EMAIL }}" \
              --password "${{ secrets.OBSIDIAN_PASSWORD }}" \
              --mfa "$MFA_CODE"
          fi

      - name: Unlock git-crypt
        run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key.bin
          git-crypt unlock /tmp/git-crypt-key.bin
          rm /tmp/git-crypt-key.bin

      - name: Setup and sync vault
        id: sync
        run: |
          ob sync-setup \
            --vault "${{ secrets.OBSIDIAN_VAULT_NAME }}" \
            --path ./vault \
            --password "${{ secrets.OBSIDIAN_E2E_PASSWORD }}" \
            --device-name "gh-actions-backup"
          ob sync-config --path ./vault --mode pull-only

          # Print diagnostics: config, server host, and connectivity
          ob sync-status --path ./vault
          SYNC_HOST=$(node -e "
            const fs = require('fs'), path = require('path');
            const cfgDir = path.join(require('os').homedir(), '.config/obsidian-headless/sync');
            for (const d of fs.readdirSync(cfgDir)) {
              const f = path.join(cfgDir, d, 'config.json');
              if (fs.existsSync(f)) { const c = JSON.parse(fs.readFileSync(f)); console.log(c.host); break; }
            }
          ")
          echo "sync_host=$SYNC_HOST" >> "$GITHUB_OUTPUT"
          echo "Sync server: $SYNC_HOST"
          if curl -sf --max-time 5 "https://$SYNC_HOST" > /dev/null 2>&1; then
            echo "Server reachable (HTTPS)"
            echo "server_reachable=Yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Server unreachable or slow: $SYNC_HOST"
            echo "server_reachable=No" >> "$GITHUB_OUTPUT"
          fi

          # ob sync hangs indefinitely when the server is unresponsive or
          # another client holds the connection. The -k 10 flag sends SIGKILL
          # 10s after SIGTERM, since ob catches SIGTERM but doesn't always exit.
          MAX_ATTEMPTS=2
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Sync attempt $attempt/$MAX_ATTEMPTS..."
            if timeout -k 10 "$SYNC_TIMEOUT" ob sync --path ./vault 2>&1; then
              echo "synced=true" >> "$GITHUB_OUTPUT"
              break
            fi
            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::warning::Sync failed after $MAX_ATTEMPTS attempts. Skipping this run."
              echo "synced=false" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Sync attempt $attempt failed. Retrying in 5s..."
              sleep 5
            fi
          done
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ env.OBSIDIAN_AUTH_TOKEN }}

      - name: Commit changes
        if: steps.sync.outputs.synced == 'true'
        run: |
          git config user.name "obsidian-backup"
          git config user.email "obsidian-backup@users.noreply.github.com"
          git add vault/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "vault snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Record successful sync
        if: steps.sync.outputs.synced == 'true'
        run: |
          # SAFETY: The + prefix force-updates ONLY this tag ref.
          # It cannot affect branches. Do not change this to --force
          # which would apply globally to all refs in the push.
          git tag -f -a last-sync -m "$(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin +refs/tags/last-sync

      - name: Update sync status issue
        if: always()
        run: |
          node << 'SCRIPT'
          const { execSync } = require('child_process');
          const gh = (cmd) => execSync(`gh ${cmd}`, { encoding: 'utf8' }).trim();
          const ghJSON = (cmd) => JSON.parse(gh(`${cmd} --json number,body`));

          const LABEL = 'sync-dashboard';
          const TITLE = 'Sync Status';
          const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
          const synced = process.env.SYNCED === 'true';
          const server = process.env.SERVER || 'unknown';
          const reachable = process.env.REACHABLE || 'unknown';

          const INITIAL_BODY = [
            '## Sync Status',
            '',
            '**Last successful sync:** never',
            '**Successful syncs (this month):** 0',
            '**Failed syncs (this month):** 0',
            `**Sync server:** ${server}`,
            '',
            '### Recent failures',
            '',
            '| Time (UTC) | Server reachable |',
            '|------------|------------------|',
          ].join('\n');

          // Find or create the status issue
          let issueNum;
          try {
            const issues = JSON.parse(gh(`issue list --label "${LABEL}" --state open --json number`));
            issueNum = issues[0]?.number;
          } catch {}

          if (!issueNum) {
            try { gh(`label create "${LABEL}" --description "Sync dashboard" --color 0e8a16`); } catch {}
            const created = JSON.parse(
              gh(`issue create --title "${TITLE}" --label "${LABEL}" --body ${JSON.stringify(INITIAL_BODY)} --json number`)
            );
            issueNum = created.number;
            try { gh(`issue pin ${issueNum}`); } catch {}
          }

          // Read and parse current body
          let body = JSON.parse(gh(`issue view ${issueNum} --json body`)).body;

          const getCounter = (label) => {
            const m = body.match(new RegExp(`\\*\\*${label}:\\*\\* (\\d+)`));
            return m ? parseInt(m[1]) : 0;
          };
          const setCounter = (label, val) => {
            body = body.replace(
              new RegExp(`\\*\\*${label}:\\*\\* \\d+`),
              `**${label}:** ${val}`
            );
          };
          const setField = (label, val) => {
            body = body.replace(
              new RegExp(`\\*\\*${label}:\\*\\* .*`),
              `**${label}:** ${val}`
            );
          };

          let successCount = getCounter('Successful syncs \\(this month\\)');
          let failCount = getCounter('Failed syncs \\(this month\\)');

          if (synced) {
            successCount++;
            setField('Last successful sync', `${now} UTC`);
          } else {
            failCount++;
            // Add failure row after the separator line
            const row = `| ${now} | ${reachable} |`;
            body = body.replace(
              /(\|[-\s|]+\|)\n/,
              `$1\n${row}\n`
            );
            // Cap at 50 failure rows
            const lines = body.split('\n');
            let inTable = false;
            let rowCount = 0;
            const filtered = lines.filter(line => {
              if (line.startsWith('|---')) { inTable = true; return true; }
              if (inTable && line.startsWith('|')) {
                rowCount++;
                return rowCount <= 50;
              }
              if (inTable && !line.startsWith('|')) inTable = false;
              return true;
            });
            body = filtered.join('\n');
          }

          setCounter('Successful syncs \\(this month\\)', successCount);
          setCounter('Failed syncs \\(this month\\)', failCount);
          setField('Sync server', server);

          // Monthly archive: on the 1st, archive and reset
          const day = new Date().getUTCDate();
          if (day === 1) {
            const lastMonth = new Date(Date.now() - 86400000)
              .toLocaleDateString('en-US', { month: 'long', year: 'numeric', timeZone: 'UTC' });
            const archiveTitle = `Sync Log: ${lastMonth}`;
            let existing;
            try {
              existing = JSON.parse(gh(`issue list --search "${archiveTitle}" --json number`));
            } catch { existing = []; }
            if (!existing.length) {
              gh(`issue create --title ${JSON.stringify(archiveTitle)} --label "${LABEL}" --body ${JSON.stringify(body)}`);
              setCounter('Successful syncs \\(this month\\)', 0);
              setCounter('Failed syncs \\(this month\\)', 0);
              // Clear failure rows
              const lines = body.split('\n');
              let inTable = false;
              body = lines.filter(line => {
                if (line.startsWith('|---')) { inTable = true; return true; }
                if (inTable && line.startsWith('|')) return false;
                if (inTable && !line.startsWith('|')) inTable = false;
                return true;
              }).join('\n');
            }
          }

          gh(`issue edit ${issueNum} --body ${JSON.stringify(body)}`);
          console.log(`Updated issue #${issueNum}: synced=${synced}, successes=${successCount}, failures=${failCount}`);
          SCRIPT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNCED: ${{ steps.sync.outputs.synced }}
          SERVER: ${{ steps.sync.outputs.sync_host }}
          REACHABLE: ${{ steps.sync.outputs.server_reachable }}
