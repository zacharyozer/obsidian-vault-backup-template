name: Sync Obsidian Vault

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  SYNC_TIMEOUT: ${{ vars.SYNC_TIMEOUT || '15' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache obsidian-headless
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: obsidian-headless-${{ runner.os }}

      - name: Install tools
        run: |
          npm install -g obsidian-headless
          sudo apt-get update && sudo apt-get install -y git-crypt

      - name: Authenticate
        run: |
          if OBSIDIAN_AUTH_TOKEN="${{ secrets.OBSIDIAN_AUTH_TOKEN }}" \
             ob sync-list-remote > /dev/null 2>&1; then
            echo "Auth token valid"
            echo "OBSIDIAN_AUTH_TOKEN=${{ secrets.OBSIDIAN_AUTH_TOKEN }}" >> "$GITHUB_ENV"
          else
            echo "::warning::Auth token expired, falling back to password+TOTP"
            npm install otpauth
            MFA_CODE=$(node -e "
              const { TOTP, Secret } = require('otpauth');
              const totp = new TOTP({
                secret: Secret.fromBase32('${{ secrets.OBSIDIAN_TOTP_SECRET }}')
              });
              console.log(totp.generate());
            ")
            ob login \
              --email "${{ secrets.OBSIDIAN_EMAIL }}" \
              --password "${{ secrets.OBSIDIAN_PASSWORD }}" \
              --mfa "$MFA_CODE"
          fi

      - name: Unlock git-crypt
        run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key.bin
          git-crypt unlock /tmp/git-crypt-key.bin
          rm /tmp/git-crypt-key.bin

      - name: Setup and sync vault
        id: sync
        run: |
          START_SECONDS=$SECONDS

          ob sync-setup \
            --vault "${{ secrets.OBSIDIAN_VAULT_NAME }}" \
            --path ./vault \
            --password "${{ secrets.OBSIDIAN_E2E_PASSWORD }}" \
            --device-name "gh-actions-backup"
          ob sync-config --path ./vault --mode pull-only

          # Print diagnostics: config, server host, and connectivity
          ob sync-status --path ./vault
          SYNC_HOST=$(node -e "
            const fs = require('fs'), path = require('path');
            const cfgDir = path.join(require('os').homedir(), '.config/obsidian-headless/sync');
            for (const d of fs.readdirSync(cfgDir)) {
              const f = path.join(cfgDir, d, 'config.json');
              if (fs.existsSync(f)) { const c = JSON.parse(fs.readFileSync(f)); console.log(c.host); break; }
            }
          ")
          echo "sync_host=$SYNC_HOST" >> "$GITHUB_OUTPUT"
          echo "Sync server: $SYNC_HOST"
          if curl -sf --max-time 5 "https://$SYNC_HOST" > /dev/null 2>&1; then
            echo "Server reachable (HTTPS)"
            echo "server_reachable=Yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Server unreachable or slow: $SYNC_HOST"
            echo "server_reachable=No" >> "$GITHUB_OUTPUT"
          fi

          # ob sync hangs indefinitely when the server is unresponsive or
          # another client holds the connection. The -k 10 flag sends SIGKILL
          # 10s after SIGTERM, since ob catches SIGTERM but doesn't always exit.
          MAX_ATTEMPTS=2
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Sync attempt $attempt/$MAX_ATTEMPTS..."
            if timeout -k 10 "$SYNC_TIMEOUT" ob sync --path ./vault 2>&1; then
              echo "synced=true" >> "$GITHUB_OUTPUT"
              break
            fi
            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::warning::Sync failed after $MAX_ATTEMPTS attempts. Skipping this run."
              echo "synced=false" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Sync attempt $attempt failed. Retrying in 5s..."
              sleep 5
            fi
          done
          echo "runtime_s=$((SECONDS - START_SECONDS))" >> "$GITHUB_OUTPUT"
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ env.OBSIDIAN_AUTH_TOKEN }}

      - name: Commit changes
        if: steps.sync.outputs.synced == 'true'
        run: |
          git config user.name "obsidian-backup"
          git config user.email "obsidian-backup@users.noreply.github.com"
          git add vault/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "vault snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Record successful sync
        if: steps.sync.outputs.synced == 'true'
        run: |
          # SAFETY: The + prefix force-updates ONLY this tag ref.
          # It cannot affect branches. Do not change this to --force
          # which would apply globally to all refs in the push.
          git tag -f -a last-sync -m "$(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin +refs/tags/last-sync

      - name: Log sync result
        if: always()
        run: |
          node << 'SCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const gh = (cmd) => execSync(`gh ${cmd}`, { encoding: 'utf8' }).trim();
          const ghWithBody = (cmd, body) => {
            fs.writeFileSync('/tmp/issue-body.md', body);
            return gh(`${cmd} --body-file /tmp/issue-body.md`);
          };

          const LOG_LABEL = 'sync-log';
          const DASH_LABEL = 'sync-dashboard';
          const now = new Date();
          const ts = now.toISOString().slice(0, 16).replace('T', ' ');
          const synced = process.env.SYNCED === 'true';
          const server = process.env.SERVER || 'unknown';
          const reachable = process.env.REACHABLE === 'Yes';
          const runtime = parseInt(process.env.RUNTIME) || 0;
          const monthName = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric', timeZone: 'UTC' });

          // --- 1. Log to monthly issue ---
          const logTitle = `Sync Log: ${monthName}`;
          let logIssueNum;
          try {
            const issues = JSON.parse(gh(`issue list --label "${LOG_LABEL}" --state open --json number,title`));
            logIssueNum = issues.find(i => i.title === logTitle)?.number;
          } catch {}

          if (!logIssueNum) {
            try { gh(`label create "${LOG_LABEL}" --description "Sync run logs" --color 1d76db`); } catch {}
            const url = ghWithBody(`issue create --title "${logTitle}" --label "${LOG_LABEL}"`,
              `Monthly sync log. Each comment is one sync run.\n\nCreated automatically by the sync workflow.`);
            logIssueNum = parseInt(url.split('/').pop());
          }

          const icon = synced ? '✅' : '❌';
          const resultWord = synced ? 'synced' : 'failed';
          const jsonData = JSON.stringify({
            ts: now.toISOString(),
            result: synced ? 'success' : 'failed',
            runtime_s: runtime,
            server,
            reachable,
          });

          const comment = [
            `${icon} ${ts} UTC — ${resultWord} in ${runtime}s`,
            '',
            '<details><summary>Raw data</summary>',
            '',
            '```json',
            jsonData,
            '```',
            '',
            '</details>',
          ].join('\n');

          ghWithBody(`issue comment ${logIssueNum}`, comment);
          console.log(`Logged to issue #${logIssueNum}`);

          // --- 2. Update dashboard ---
          let dashIssueNum;
          try {
            const issues = JSON.parse(gh(`issue list --label "${DASH_LABEL}" --state open --json number`));
            dashIssueNum = issues[0]?.number;
          } catch {}

          // Count today's results from log issue comments
          const todayStr = now.toISOString().slice(0, 10);
          let todaySuccess = 0, todayFailed = 0, todayRuntimes = [];

          let page = 1;
          while (true) {
            const comments = JSON.parse(gh(
              `api repos/{owner}/{repo}/issues/${logIssueNum}/comments --per-page 100 --paginate -q '[.[] | {body, created_at}]'`
            ).replace(/\]\[/g, ','));
            for (const c of comments) {
              if (!c.created_at.startsWith(todayStr)) continue;
              const m = c.body.match(/```json\n(.*?)\n```/s);
              if (!m) continue;
              try {
                const data = JSON.parse(m[1]);
                if (data.result === 'success') todaySuccess++;
                else todayFailed++;
                if (data.runtime_s) todayRuntimes.push(data.runtime_s);
              } catch {}
            }
            break;
          }

          const avgRuntime = todayRuntimes.length
            ? Math.round(todayRuntimes.reduce((a, b) => a + b, 0) / todayRuntimes.length)
            : 0;
          const todayLabel = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });

          const dashBody = [
            '## Sync Status',
            '',
            `**Last sync:** ${ts} UTC (${icon} ${resultWord})`,
            `**Server:** ${server}`,
            '',
            `### Today (${todayLabel})`,
            `${todaySuccess} success, ${todayFailed} failed | Avg runtime: ${avgRuntime}s`,
            '',
            '_Past 30 days and monthly history are updated daily by the rollup job._',
          ].join('\n');

          if (!dashIssueNum) {
            try { gh(`label create "${DASH_LABEL}" --description "Sync dashboard" --color 0e8a16`); } catch {}
            const url = ghWithBody(`issue create --title "Sync Status" --label "${DASH_LABEL}"`, dashBody);
            dashIssueNum = parseInt(url.split('/').pop());
            try { gh(`issue pin ${dashIssueNum}`); } catch {}
          } else {
            // Preserve rollup sections if they exist
            const existing = JSON.parse(gh(`issue view ${dashIssueNum} --json body`)).body;
            const rollupMarker = '### Past 30 Days';
            const rollupIdx = existing.indexOf(rollupMarker);
            const finalBody = rollupIdx >= 0
              ? dashBody.replace(
                  '_Past 30 days and monthly history are updated daily by the rollup job._',
                  existing.slice(rollupIdx)
                )
              : dashBody;
            ghWithBody(`issue edit ${dashIssueNum}`, finalBody);
          }

          console.log(`Updated dashboard #${dashIssueNum}: today=${todaySuccess}/${todaySuccess + todayFailed}`);
          SCRIPT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNCED: ${{ steps.sync.outputs.synced }}
          SERVER: ${{ steps.sync.outputs.sync_host }}
          REACHABLE: ${{ steps.sync.outputs.server_reachable }}
          RUNTIME: ${{ steps.sync.outputs.runtime_s }}
